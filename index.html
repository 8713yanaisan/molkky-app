<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>モルック練習記録</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<style>
body { font-family: sans-serif; text-align: center; margin:0; }
header { background:#222; color:white; padding:8px; font-size:16px; }
.container { padding:10px; }

.menu-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.menu-btn {
  aspect-ratio:1/1;
  border-radius:20px;
  border:none;
  font-size:16px;
}

#grid { display:grid; grid-template-columns:repeat(3,90px); gap:10px; justify-content:center; }

button {
  height:90px;
  border-radius:12px;
  border:none;
}

.center { transform:scale(1.2); border:3px solid #000; }

.save-anim { background:#4CAF50 !important; color:white; }

.hidden { display:none; }
</style>
</head>
<body>

<header>モルック練習</header>

<div id="menu" class="container">
  <h3>メニュー</h3>
  <div class="menu-grid">
    <button class="menu-btn" onclick="showSetup()">練習開始</button>
    <button class="menu-btn" onclick="showAnalysis()">分析</button>
  </div>
</div>

<div id="setup" class="container hidden">
  <h3>距離選択</h3>
  <select id="distance"></select>
  <br><br>
  <button onclick="start()">スタート</button>
</div>

<div id="game" class="container hidden">
  <h3 id="info"></h3>
  <div id="grid"></div>
  <p id="accuracy"></p>
  <button onclick="undo()">↩ 戻る</button>
  <br><br>
  <button id="saveBtn" onclick="saveSession()">保存</button>
  <button onclick="downloadImage()">画像保存</button>
</div>

<script>
let distance=0, throwCount=1, records=[];
const directions=['↖','↑','↗','←','○','→','↙','↓','↘'];

function hideAll(){menu.classList.add('hidden');setup.classList.add('hidden');game.classList.add('hidden');}
function showSetup(){hideAll();setup.classList.remove('hidden');initDistance();}
function showAnalysis(){alert('分析は省略');}

// 距離プルダウン
function initDistance(){
  const sel=document.getElementById('distance');
  sel.innerHTML='';
  for(let d=3.5; d<=12; d+=0.5){
    const opt=document.createElement('option');
    opt.value=d.toFixed(1);
    opt.text=d.toFixed(1)+' m';
    sel.appendChild(opt);
  }
}

function start(){
  distance=document.getElementById('distance').value;
  hideAll(); game.classList.remove('hidden');
  updateGrid(); updateInfo();
}

function updateGrid(){
  const counts={}; directions.forEach(d=>counts[d]=0);
  records.forEach(r=>counts[r]++);
  const total=records.length;

  grid.innerHTML='';

  directions.forEach(d=>{
    const btn=document.createElement('button');
    const c=counts[d];
    const ratio=total?c/total:0;

    if(d==='○'){btn.style.background=`rgba(0,200,0,${ratio})`;btn.classList.add('center');}
    else{btn.style.background=`rgba(255,0,0,${ratio})`;}

    btn.innerText=`${d}\n${c}回\n${Math.round(ratio*100)}%`;
    btn.onclick=()=>record(d);

    grid.appendChild(btn);
  });
}

function record(r){records.push(r);throwCount++;updateInfo();updateGrid();}
function undo(){if(records.length===0)return;records.pop();throwCount--;updateInfo();updateGrid();}

function updateInfo(){
  info.innerText=`${distance}m / ${throwCount}投目`;
  const hit=records.filter(r=>r==='○').length;
  const rate=records.length?Math.round(hit/records.length*100):0;
  accuracy.innerText=`命中率 ${rate}%`;
}

// 保存演出
function saveSession(){
  const btn=document.getElementById('saveBtn');
  btn.classList.add('save-anim');
  btn.innerText='保存完了✔';

  const all=JSON.parse(localStorage.getItem('sessions')||'[]');
  all.push({distance,records});
  localStorage.setItem('sessions',JSON.stringify(all));

  setTimeout(()=>{
    btn.classList.remove('save-anim');
    btn.innerText='保存';
  },1000);
}

// 画像保存
function downloadImage(){
  html2canvas(document.body).then(canvas=>{
    const link=document.createElement('a');
    link.download='result.png';
    link.href=canvas.toDataURL();
    link.click();
  });
}

showSetup();
</script>

</body>
</html>
