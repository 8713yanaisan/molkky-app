<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>モルック練習記録</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; text-align: center; margin:0; }
header { background:#222; color:white; padding:8px; }
.container { padding:10px; }

.menu-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; max-width:300px; margin:auto; }
.menu-btn { aspect-ratio:1/1; border-radius:20px; border:none; }

#grid { display:grid; grid-template-columns:repeat(3,80px); gap:10px; justify-content:center; margin:auto; }
button { border-radius:12px; border:none; }
.center { transform:scale(1.2); border:3px solid #000; }
.hidden { display:none; }

#history { text-align:left; max-width:250px; margin:10px auto; }

.score-grid { display:grid; grid-template-columns:repeat(4,60px); gap:8px; justify-content:center; }
</style>
</head>
<body>
<header>モルック練習</header>

<div id="menu" class="container">
  <div class="menu-grid">
    <button class="menu-btn" onclick="showSetup()">練習</button>
    <button class="menu-btn" onclick="showAnalysis()">分析</button>
    <button class="menu-btn" onclick="showBreak()">ブレイク</button>
  </div>
</div>

<div id="setup" class="container hidden">
  <select id="distance"></select><br><br>
  <button onclick="start()">スタート</button><br><br>
  <button onclick="showMenu()">戻る</button>
</div>

<div id="game" class="container hidden">
  <h3 id="info"></h3>
  <div id="grid"></div>
  <p id="accuracy"></p>
  <div id="history"></div>
  <button onclick="undo()">戻る</button>
  <button onclick="showMenu()">メニュー</button>
</div>

<div id="analysis" class="container hidden">
  <h3>分析</h3>
  <input type="date" id="fromDate">〜
  <input type="date" id="toDate">
  <button onclick="updateAnalysis()">絞込</button>
  <div id="analysisHeatmap"></div>
  <button onclick="showMenu()">戻る</button>
</div>

<div id="break" class="container hidden">
  <h3>ブレイク練習</h3>
  <div class="score-grid" id="scoreGrid"></div>
  <p id="avg"></p>
  <canvas id="breakChart"></canvas>
  <button onclick="showMenu()">戻る</button>
</div>

<script>
let records=[];
const directions=['↖','↑','↗','←','○','→','↙','↓','↘'];

function hideAll(){menu.classList.add('hidden');setup.classList.add('hidden');game.classList.add('hidden');analysis.classList.add('hidden');breakDiv.classList.add('hidden');}
function showMenu(){hideAll();menu.classList.remove('hidden');}
function showSetup(){hideAll();setup.classList.remove('hidden');initDistance();}
function showAnalysis(){hideAll();analysis.classList.remove('hidden');}
function showBreak(){hideAll();breakDiv.classList.remove('hidden');initBreak();}

function initDistance(){
  distance.innerHTML='';
  for(let d=3.5; d<=12; d+=0.5){
    const o=document.createElement('option'); o.value=d; o.text=d+'m'; distance.appendChild(o);
  }
}

function start(){records=[];hideAll();game.classList.remove('hidden');update();}

function update(){
  grid.innerHTML='';
  const counts={}; directions.forEach(d=>counts[d]=0);
  records.forEach(r=>counts[r]++);

  directions.forEach(d=>{
    const b=document.createElement('button');
    b.innerText=d;
    b.onclick=()=>{records.push(d);update();};
    grid.appendChild(b);
  });

  info.innerText=`${records.length+1}投目`;

  history.innerHTML='';
  records.forEach((r,i)=>{
    const div=document.createElement('div');
    div.innerText=`${i+1}投目：${r}`;
    history.appendChild(div);
  });
}

function undo(){records.pop();update();}

// 分析（簡易）
function updateAnalysis(){
  const from=new Date(fromDate.value);
  const to=new Date(toDate.value);
  const all=JSON.parse(localStorage.getItem('sessions')||'[]');
  const filtered=all.filter(s=>{
    const d=new Date(s.date);
    return d>=from && d<=to;
  });

  analysisHeatmap.innerHTML=`件数:${filtered.length}`;
}

// ブレイク
let scores=[];
function initBreak(){
  scoreGrid.innerHTML='';
  for(let i=0;i<=12;i++){
    const b=document.createElement('button');
    b.innerText=i;
    b.onclick=()=>{scores.push(i);updateBreak();};
    scoreGrid.appendChild(b);
  }
}

function updateBreak(){
  const avgScore=scores.reduce((a,b)=>a+b,0)/scores.length;
  avg.innerText=`平均:${avgScore.toFixed(2)}`;

  new Chart(breakChart,{
    type:'line',
    data:{labels:scores.map((_,i)=>i+1),datasets:[{data:scores}]}
  });
}

showMenu();
</script>
</body>
</html>
