<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>モルック練習記録</title>
<style>
body{font-family:sans-serif;text-align:center;margin:0}
header{background:#222;color:#fff;padding:10px}
.container{padding:12px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:340px;margin:auto}
.menu-btn{aspect-ratio:1;border-radius:16px;border:2px solid #333;font-size:14px}
button{border-radius:10px;border:2px solid #333;padding:10px}
.btn-row{display:flex;gap:10px;margin-top:10px}
.btn-row button{flex:1}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:300px;margin:auto}
#grid button{aspect-ratio:1}
#scoreGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:300px;margin:auto}
.hidden{display:none}
</style>
</head>
<body>
<header id="header"></header>

<!-- メニュー -->
<div id="menu" class="container">
  <div class="menu-grid">
    <button class="menu-btn" onclick="showSetup()">練習</button>
    <button class="menu-btn" onclick="showBreak()">ブレイク</button>
    <button class="menu-btn" onclick="setName()">名前設定</button>
    <button class="menu-btn" onclick="showAnalysis()">分析</button>
    <button class="menu-btn" onclick="exportData()">エクスポート</button>
    <button class="menu-btn" onclick="importData()">インポート</button>
  </div>
</div>

<!-- 練習設定 -->
<div id="setup" class="container hidden">
  <h3>距離選択</h3>
  <select id="distance"></select>
  <div class="btn-row">
    <button onclick="startPractice()">スタート</button>
    <button onclick="showMenu()">戻る</button>
  </div>
</div>

<!-- 練習画面 -->
<div id="practice" class="container hidden">
  <h3 id="info"></h3>
  <div id="grid"></div>
  <div id="log"></div>
  <div class="btn-row">
    <button onclick="undo()">戻る</button>
    <button onclick="savePractice()">保存</button>
    <button onclick="showMenu()">メニュー</button>
  </div>
</div>

<!-- ブレイク画面 -->
<div id="break" class="container hidden">
  <h3>ブレイク練習</h3>
  <div id="scoreGrid"></div>
  <div id="breakLog"></div>
  <p id="avg"></p>
  <div class="btn-row">
    <button onclick="undoBreak()">戻る</button>
    <button onclick="saveBreak()">保存</button>
    <button onclick="showMenu()">メニュー</button>
  </div>
</div>

<!-- 分析 -->
<div id="analysis" class="container hidden">
  <h3>分析</h3>
  <div id="users"></div>
  <div id="distanceStats"></div>
  <div id="breakStats"></div>
  <button onclick="showMenu()">戻る</button>
</div>

<button onclick="resetData()">データリセット</button>

<input type="file" id="file" class="hidden" accept="application/json">

<script>
function getUser(){
  let u=JSON.parse(localStorage.getItem('user'));
  if(!u){ u={id:Date.now(),name:'名無し'}; localStorage.setItem('user',JSON.stringify(u)); }
  return u;
}

function setName(){
  const n=prompt('名前'); if(!n)return;
  const u=getUser(); u.name=n;
  localStorage.setItem('user',JSON.stringify(u)); updateHeader();
}

function updateHeader(){
  const u=getUser();
  document.getElementById('header').innerText=`モルック（${u.name}）`;
}

function hideAll(){['menu','setup','practice','break','analysis'].forEach(id=>{
  document.getElementById(id).classList.add('hidden');
});}

function showMenu(){ hideAll(); document.getElementById('menu').classList.remove('hidden'); }
function showSetup(){ hideAll(); document.getElementById('setup').classList.remove('hidden'); initDistance(); }
function showBreak(){ hideAll(); document.getElementById('break').classList.remove('hidden'); initBreak(); }
function showAnalysis(){ hideAll(); document.getElementById('analysis').classList.remove('hidden'); renderAnalysis(); }

// 練習
let records=[]; let distance=0;
const dirs=['↖','↑','↗','←','○','→','↙','↓','↘'];

function initDistance(){
  const sel=document.getElementById('distance'); sel.innerHTML='';
  for(let d=3.5;d<=12;d+=0.5){
    const o=document.createElement('option'); o.value=d; o.text=d+'m';
    sel.appendChild(o);
  }
}

function startPractice(){
  records=[];
  distance=document.getElementById('distance').value;
  hideAll(); document.getElementById('practice').classList.remove('hidden');
  renderPractice();
}

function renderPractice(){
  const grid=document.getElementById('grid');
  const log=document.getElementById('log');
  const info=document.getElementById('info');

  grid.innerHTML=''; log.innerHTML='';
  const counts={}; dirs.forEach(d=>counts[d]=0);
  records.forEach(r=>counts[r]++);
  const total=records.length;

  dirs.forEach(d=>{
    const c=counts[d]; const p=total?Math.round(c/total*100):0;
    const b=document.createElement('button');
    b.innerText=`${d}\n${c}\n${p}%`;
    b.onclick=()=>{records.push(d);renderPractice()};
    grid.appendChild(b);
  });

  info.innerText=`${distance}m / ${records.length+1}投目`;
  records.forEach((r,i)=>{
    const div=document.createElement('div');
    div.innerText=`${i+1}投目：${r}`;
    log.appendChild(div);
  });
}

function undo(){records.pop();renderPractice()}

function savePractice(){
  const u=getUser();
  const all=JSON.parse(localStorage.getItem('sessions')||'[]');
  all.push({userId:u.id,userName:u.name,distance,records});
  localStorage.setItem('sessions',JSON.stringify(all));
  alert('保存');
}

// ブレイク
let breakRecords=[];
function initBreak(){
  const g=document.getElementById('scoreGrid'); g.innerHTML=''; breakRecords=[];
  for(let i=0;i<=12;i++){
    const b=document.createElement('button'); b.innerText=i;
    b.onclick=()=>{breakRecords.push(i);updateBreak()};
    g.appendChild(b);
  }
}

function updateBreak(){
  const avg=breakRecords.reduce((a,b)=>a+b,0)/breakRecords.length;
  document.getElementById('avg').innerText=avg?`平均:${avg.toFixed(2)}`:'';
  const log=document.getElementById('breakLog'); log.innerHTML='';
  breakRecords.forEach((s,i)=>{
    const d=document.createElement('div'); d.innerText=`${i+1}投目:${s}`;
    log.appendChild(d);
  });
}

function undoBreak(){breakRecords.pop();updateBreak()}

function saveBreak(){
  const u=getUser();
  const all=JSON.parse(localStorage.getItem('breaks')||'[]');
  all.push({userId:u.id,userName:u.name,scores:breakRecords});
  localStorage.setItem('breaks',JSON.stringify(all));
  alert('保存');
}

// 分析（強化版）
function renderAnalysis(){
  const sessions=JSON.parse(localStorage.getItem('sessions')||'[]');
  const breaks=JSON.parse(localStorage.getItem('breaks')||'[]');

  const users={};

  // ===== 練習データ集計 =====
  sessions.forEach(s=>{
    if(!users[s.userId]){
      users[s.userId]={name:s.userName,hit:0,total:0,dist:{}};
    }

    s.records.forEach(r=>{
      users[s.userId].total++;
      if(r==='○') users[s.userId].hit++;

      if(!users[s.userId].dist[s.distance]){
        users[s.userId].dist[s.distance]={hit:0,total:0};
      }

      users[s.userId].dist[s.distance].total++;
      if(r==='○') users[s.userId].dist[s.distance].hit++;
    });
  });

  const usersDiv=document.getElementById('users');
  const distDiv=document.getElementById('distanceStats');
  const breakDiv=document.getElementById('breakStats');

  usersDiv.innerHTML='';
  distDiv.innerHTML='';
  breakDiv.innerHTML='';

  // ===== 表示（練習） =====
  Object.values(users).forEach(u=>{
    const rate=u.total?Math.round(u.hit/u.total*100):0;

    const d=document.createElement('div');
    d.innerText=`${u.name}：${rate}% (${u.total}投)`;
    usersDiv.appendChild(d);

    Object.entries(u.dist).forEach(([dist,data])=>{
      const r=data.total?Math.round(data.hit/data.total*100):0;
      const dd=document.createElement('div');
      dd.innerText=`${u.name} ${dist}m：${r}% (${data.total}投)`;
      distDiv.appendChild(dd);
    });
  });

  // ===== ブレイク分析 =====
  const breakUsers={};

  breaks.forEach(b=>{
    if(!breakUsers[b.userId]){
      breakUsers[b.userId]={name:b.userName,total:0,count:0};
    }

    b.scores.forEach(s=>{
      breakUsers[b.userId].total+=s;
      breakUsers[b.userId].count++;
    });
  });

  Object.values(breakUsers).forEach(u=>{
    const avg=u.count? (u.total/u.count).toFixed(2):0;

    const d=document.createElement('div');
    d.innerText=`${u.name} ブレイク平均：${avg}（${u.count}投）`;
    breakDiv.appendChild(d);
  });
}

// リセット機能（復活）
function resetData(){
  if(!confirm('全データを削除しますか？')) return;
  localStorage.removeItem('sessions');
  localStorage.removeItem('breaks');
  alert('データをリセットしました');
  location.reload();
}

updateHeader(); showMenu();
</script>
</body>
</html>
