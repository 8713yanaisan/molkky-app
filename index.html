<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>モルック練習記録</title>
<style>
body { font-family: sans-serif; text-align: center; margin:0; }
header { background:#222; color:white; padding:10px; font-size:18px; }
.container { padding:12px; }

.menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; max-width:320px; margin:auto; }
.menu-btn { aspect-ratio:1/1; border-radius:20px; border:2px solid #333; font-size:18px; font-weight:bold; }

button { border-radius:12px; border:2px solid #333; padding:12px; font-size:16px; }
.btn-row { display:flex; gap:10px; justify-content:center; margin-top:10px; }
.btn-row button { flex:1; }

#grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:300px; margin:10px auto; }
#grid button { aspect-ratio:1/1; }

.analysisHeatmap { display:grid; grid-template-columns:repeat(3,60px); gap:6px; justify-content:center; }
.cell { height:60px; display:flex; align-items:center; justify-content:center; border-radius:8px; border:1px solid #333; font-size:11px; white-space:pre-line; }

.hidden { display:none; }
</style>
</head>
<body>
<header>モルック練習</header>

<div id="menu" class="container">
  <div class="menu-grid">
    <button class="menu-btn" onclick="showSetup()">練習</button>
    <button class="menu-btn" onclick="showBreak()">ブレイク</button>
    <button class="menu-btn" onclick="startTraining()">開始</button>
    <button class="menu-btn" onclick="endTraining()">終了</button>
    <button class="menu-btn" onclick="showAnalysis()">分析</button>
    <button class="menu-btn" onclick="exportData()">エクスポート</button>
  </div>
</div>

<div id="setup" class="container hidden">
  <select id="distance" style="font-size:18px;padding:10px;"></select>
  <div class="btn-row">
    <button onclick="start()">スタート</button>
    <button onclick="showMenu()">メニュー</button>
  </div>
</div>

<div id="game" class="container hidden">
  <h3 id="info"></h3>
  <div id="grid"></div>
  <div id="log"></div>
  <div class="btn-row">
    <button onclick="undo()">戻る</button>
    <button onclick="saveSession()">保存</button>
    <button onclick="showMenu()">メニュー</button>
  </div>
</div>

<div id="break" class="container hidden">
  <h3>ブレイク</h3>
  <div id="scoreGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:300px;margin:auto;"></div>
  <p id="avg"></p>
  <div id="breakLog"></div>
  <div class="btn-row">
    <button onclick="undoBreak()">戻る</button>
    <button onclick="saveBreak()">保存</button>
    <button onclick="showMenu()">メニュー</button>
  </div>
</div>

<div id="analysis" class="container hidden">
  <h3>分析</h3>

  <input type="date" id="fromDate">〜
  <input type="date" id="toDate">
  <button onclick="updateAnalysis()">絞込</button>

  <h4>練習時間</h4>
  <div id="timeStats"></div>

  <h4>距離別ヒット率</h4>
  <div id="distanceStats"></div>

  <h4>距離別ヒートマップ</h4>
  <div id="distanceHeatmaps"></div>

  <h4>ブレイク分析</h4>
  <div id="breakAnalysis"></div>

  <button onclick="showMenu()">戻る</button>
</div>

<script>
let records=[];
let breakRecords=[];
let currentDistance=0;
let trainingStart=null;

const directions=['↖','↑','↗','←','○','→','↙','↓','↘'];

function hideAll(){['menu','setup','game','break','analysis'].forEach(id=>document.getElementById(id).classList.add('hidden'));}
function showMenu(){ hideAll(); document.getElementById('menu').classList.remove('hidden'); }
function showSetup(){ hideAll(); document.getElementById('setup').classList.remove('hidden'); initDistance(); }
function showBreak(){ hideAll(); document.getElementById('break').classList.remove('hidden'); initBreak(); }
function showAnalysis(){ hideAll(); document.getElementById('analysis').classList.remove('hidden'); initDate(); updateAnalysis(); }

function startTraining(){
  trainingStart=new Date();
  localStorage.setItem('trainingStart', trainingStart.toISOString());
  alert('練習開始');
}

function endTraining(){
  const startStr=localStorage.getItem('trainingStart');
  if(!startStr){ alert('開始していません'); return; }

  const start=new Date(startStr);
  const end=new Date();
  const diff=(end-start)/1000/60/60; // 時間

  const logs=JSON.parse(localStorage.getItem('trainingLogs')||'[]');
  logs.push({start:startStr,end:end.toISOString(),duration:diff});
  localStorage.setItem('trainingLogs',JSON.stringify(logs));

  localStorage.removeItem('trainingStart');
  alert(`終了：${diff.toFixed(2)}時間`);
}

function initDistance(){
  const sel=document.getElementById('distance');
  sel.innerHTML='';
  for(let d=3.5; d<=12; d+=0.5){
    const o=document.createElement('option'); o.value=d; o.text=d+'m'; sel.appendChild(o);
  }
}

function initDate(){
  const today=new Date();
  const past=new Date();
  past.setDate(today.getDate()-100);
  document.getElementById('fromDate').value=past.toISOString().split('T')[0];
  document.getElementById('toDate').value=today.toISOString().split('T')[0];
}

function start(){ records=[]; currentDistance=document.getElementById('distance').value; hideAll(); game.classList.remove('hidden'); update(); }

function update(){
  const grid=document.getElementById('grid');
  const log=document.getElementById('log');
  grid.innerHTML=''; log.innerHTML='';

  const counts={}; directions.forEach(d=>counts[d]=0);
  records.forEach(r=>counts[r]++);
  const total=records.length;

  directions.forEach(d=>{
    const c=counts[d];
    const ratio=total?c/total:0;
    const b=document.createElement('button');
    b.style.background=d==='○'?`rgba(0,200,0,${ratio})`:`rgba(255,0,0,${ratio})`;
    b.innerText=`${d}\n${c}\n${Math.round(ratio*100)}%`;
    b.onclick=()=>{records.push(d); update();};
    grid.appendChild(b);
  });

  info.innerText=`${currentDistance}m / ${records.length+1}投目`;

  records.forEach((r,i)=>{
    const div=document.createElement('div');
    div.innerText=`${i+1}投目：${r}`;
    log.appendChild(div);
  });
}

function undo(){records.pop(); update();}

function saveSession(){
  const all=JSON.parse(localStorage.getItem('sessions')||'[]');
  all.push({date:new Date().toISOString(),distance:currentDistance,records});
  localStorage.setItem('sessions',JSON.stringify(all));
  alert('保存');
}

function initBreak(){
  const grid=document.getElementById('scoreGrid');
  const log=document.getElementById('breakLog');
  grid.innerHTML=''; breakRecords=[]; log.innerHTML='';
  for(let i=0;i<=12;i++){
    const b=document.createElement('button');
    b.innerText=i;
    b.onclick=()=>{breakRecords.push(i); updateBreak();};
    grid.appendChild(b);
  }
}

function updateBreak(){
  const avgVal=breakRecords.reduce((a,b)=>a+b,0)/breakRecords.length;
  document.getElementById('avg').innerText=`平均:${avgVal.toFixed(2)}`;

  const log=document.getElementById('breakLog');
  log.innerHTML='';
  breakRecords.forEach((s,i)=>{
    const div=document.createElement('div');
    div.innerText=`${i+1}投目：${s}`;
    log.appendChild(div);
  });
}

function undoBreak(){breakRecords.pop(); updateBreak();}

function saveBreak(){
  const all=JSON.parse(localStorage.getItem('breaks')||'[]');
  all.push({date:new Date().toISOString(),scores:breakRecords});
  localStorage.setItem('breaks',JSON.stringify(all));
  alert('保存');
}

function updateAnalysis(){
  const logs=JSON.parse(localStorage.getItem('trainingLogs')||'[]');
  const timeDiv=document.getElementById('timeStats');

  if(logs.length===0){ timeDiv.innerText='データなし'; }
  else{
    let total=0;
    logs.forEach(l=> total+=l.duration);
    timeDiv.innerText=`累積：${total.toFixed(2)}時間 / 回数：${logs.length}`;
  }

  const from=new Date(document.getElementById('fromDate').value);
  const to=new Date(document.getElementById('toDate').value);

  const sessions=JSON.parse(localStorage.getItem('sessions')||'[]');
  const filtered=sessions.filter(s=>{
    const d=new Date(s.date);
    return d>=from && d<=to;
  });

  const byDistance={};
  filtered.forEach(s=>{
    if(!byDistance[s.distance]) byDistance[s.distance]=[];
    byDistance[s.distance].push(...s.records);
  });

  const stats=document.getElementById('distanceStats');
  const maps=document.getElementById('distanceHeatmaps');
  stats.innerHTML=''; maps.innerHTML='';

  Object.keys(byDistance).sort((a,b)=>a-b).forEach(dist=>{
    const recs=byDistance[dist];
    const hit=recs.filter(r=>r==='○').length;
    const rate=Math.round(hit/recs.length*100);

    const s=document.createElement('div');
    s.innerText=`${dist}m：命中率 ${rate}%`;
    stats.appendChild(s);

    const counts={}; directions.forEach(d=>counts[d]=0);
    recs.forEach(r=>counts[r]++);

    const g=document.createElement('div');
    g.className='analysisHeatmap';

    directions.forEach(d=>{
      const c=counts[d];
      const ratio=recs.length?c/recs.length:0;
      const cell=document.createElement('div');
      cell.className='cell';
      cell.style.background=d==='○'?`rgba(0,200,0,${ratio})`:`rgba(255,0,0,${ratio})`;
      cell.innerText=`${d}\n${c}\n${Math.round(ratio*100)}%`;
      g.appendChild(cell);
    });

    maps.appendChild(g);
  });

  const breaks=JSON.parse(localStorage.getItem('breaks')||'[]');
  const breakDiv=document.getElementById('breakAnalysis');
  breakDiv.innerHTML='';

  if(breaks.length===0){ breakDiv.innerText='データなし'; return; }

  let scores=[];
  breaks.forEach(b=>scores.push(...b.scores));
  const avg=scores.reduce((a,b)=>a+b,0)/scores.length;

  breakDiv.innerText=`平均スコア：${avg.toFixed(2)}（${scores.length}投）`;
}

function exportData(){
  const data={
    sessions: JSON.parse(localStorage.getItem('sessions')||'[]'),
    breaks: JSON.parse(localStorage.getItem('breaks')||'[]'),
    trainingLogs: JSON.parse(localStorage.getItem('trainingLogs')||'[]')
  };

  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='molkky_data.json';
  a.click();
}

showMenu();
</script>
</body>
</html>
